{% extends 'dashboard.html' %}

{% block content %}
<div class="max-w-7xl mx-auto mobile-content-padding h-full flex flex-col">
    <!-- Compact Header Section -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                </svg>
            </div>
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-neutral-900 dark:text-white">Produtos</h2>
                <p class="text-xs md:text-sm text-neutral-600 dark:text-neutral-400">Gerencie seu catálogo</p>
            </div>
        </div>
        
        <!-- Search and Actions -->
        <div class="flex items-center gap-3">
            <div class="relative flex-1 sm:flex-none">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Buscar produtos..." 
                    class="w-full sm:w-64 px-3 py-2 text-sm border border-neutral-300 dark:border-neutral-600 rounded-lg bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white placeholder-neutral-500 dark:placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400 transition-colors duration-200">
                <svg class="absolute right-3 top-2.5 w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <a href="{% url 'create_product' %}" 
               class="inline-flex items-center justify-center px-4 py-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200 shadow-sm hover:shadow-md text-sm">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                </svg>
                <span class="hidden sm:inline">Novo Produto</span>
                <span class="sm:hidden">Novo</span>
            </a>
        </div>
    </div>

    <!-- Compact Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
        <div class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-neutral-600 dark:text-neutral-400">Total</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statTotal">0</p>
                </div>
                <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-neutral-600 dark:text-neutral-400">Valor Total</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statValue">R$ 0,00</p>
                </div>
                <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-neutral-600 dark:text-neutral-400">Com Estoque</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statStock">0</p>
                </div>
                <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-neutral-600 dark:text-neutral-400">Categorias</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statCategories">0</p>
                </div>
                <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Products List with Pagination -->
    <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 shadow-sm overflow-hidden flex-1 flex flex-col">
        <div class="px-4 md:px-6 py-3 border-b border-neutral-200 dark:border-neutral-700 flex items-center justify-between">
            <h3 class="text-base font-semibold text-neutral-900 dark:text-white">Lista de Produtos</h3>
            <div class="flex items-center gap-2 text-sm text-neutral-600 dark:text-neutral-400">
                <span id="resultsInfo">Mostrando 0-0 de 0 produtos</span>
            </div>
        </div>
        
        <!-- Products Container -->
        <div class="flex-1 overflow-hidden" id="productsContainer">
            <!-- Desktop Table -->
            <div class="hidden md:block h-full overflow-y-auto" id="desktopTable">
                <table class="w-full">
                    <thead class="bg-neutral-50 dark:bg-neutral-700 sticky top-0">
                        <tr>
                            <th class="px-4 py-3 text-left text-xs font-medium text-neutral-700 dark:text-neutral-300 uppercase tracking-wider">
                                Produto
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-neutral-700 dark:text-neutral-300 uppercase tracking-wider">
                                Preço
                            </th>
                            <th class="px-4 py-3 text-left text-xs font-medium text-neutral-700 dark:text-neutral-300 uppercase tracking-wider">
                                Estoque
                            </th>
                            <th class="px-4 py-3 text-right text-xs font-medium text-neutral-700 dark:text-neutral-300 uppercase tracking-wider">
                                Ações
                            </th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-neutral-200 dark:divide-neutral-700" id="productsTableBody">
                    </tbody>
                </table>
            </div>

            <!-- Mobile Cards -->
            <div class="md:hidden h-full overflow-y-auto" id="mobileCards">
                <div class="divide-y divide-neutral-200 dark:divide-neutral-700" id="mobileCardsContainer">
                </div>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div class="px-4 md:px-6 py-3 border-t border-neutral-200 dark:border-neutral-700 flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3" id="paginationControls">
            <!-- Controle de Itens por Página -->
            <div class="flex items-center justify-center sm:justify-start gap-2">
                <span class="text-xs text-neutral-600 dark:text-neutral-400">Itens por página:</span>
                <select id="itemsPerPage" class="text-sm border border-neutral-300 dark:border-neutral-600 rounded px-2 py-1 bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                </select>
            </div>
            
            <!-- Navegação de Páginas -->
            <div class="flex items-center justify-center gap-2">
                <button id="prevPage" class="inline-flex items-center px-3 py-1.5 border border-neutral-300 dark:border-neutral-600 text-sm font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Anterior
                </button>
                
                <div id="pageNumbers" class="flex items-center gap-1">
                    <!-- Page numbers will be generated by JavaScript -->
                </div>
                
                <button id="nextPage" class="inline-flex items-center px-3 py-1.5 border border-neutral-300 dark:border-neutral-600 text-sm font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    Próxima
                    <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentPage = 1;
    let itemsPerPage = 5;
    let searchTimeout = null;
    const searchInput = document.getElementById('searchInput');
    const resultsInfo = document.getElementById('resultsInfo');
    const itemsPerPageSelect = document.getElementById('itemsPerPage');
    const prevButton = document.getElementById('prevPage');
    const nextButton = document.getElementById('nextPage');
    const pageNumbers = document.getElementById('pageNumbers');

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function stockBadge(p) {
        if (!p.stock_active) {
            return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">Cont&iacute;nuo</span>`;
        }
        if (p.stock_quantity > 0) {
            return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200">${p.stock_quantity} unidades</span>`;
        }
        return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200">Esgotado</span>`;
    }

    loadProducts();

    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadProducts();
            }, 300);
        });
    }

    if (itemsPerPageSelect) {
        itemsPerPageSelect.addEventListener('change', function() {
            itemsPerPage = parseInt(this.value);
            currentPage = 1;
            loadProducts();
        });
    }

    if (prevButton) {
        prevButton.addEventListener('click', function() {
            if (currentPage > 1) { currentPage--; loadProducts(); }
        });
    }

    if (nextButton) {
        nextButton.addEventListener('click', function() {
            currentPage++;
            loadProducts();
        });
    }

    async function loadProducts() {
        const search = searchInput ? searchInput.value.trim() : '';
        const { ok, data } = await apiRequest(`/products/api/?page=${currentPage}&per_page=${itemsPerPage}&search=${encodeURIComponent(search)}`);
        if (!ok) return;

        renderTable(data.data);
        renderCards(data.data);
        updatePagination(data);
        updateStats(data.stats);
    }

    function renderTable(products) {
        const tbody = document.getElementById('productsTableBody');
        if (!tbody) return;
        const container = document.getElementById('productsContainer');

        if (products.length === 0) {
            tbody.innerHTML = '';
            container.innerHTML = `
                <div class="text-center py-12 flex flex-col items-center justify-center h-full">
                    <div class="w-16 h-16 bg-neutral-100 dark:bg-neutral-700 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-neutral-400 dark:text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-medium text-neutral-900 dark:text-white mb-2">Nenhum produto encontrado</h3>
                    <p class="text-neutral-600 dark:text-neutral-400 mb-6">Comece criando seu primeiro produto</p>
                    <a href="/products/create/" class="inline-flex items-center px-4 py-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200 shadow-sm text-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Criar Produto
                    </a>
                </div>`;
            return;
        }

        const safeName = (p) => escapeHtml(p.name);
        const safeImg = (p) => escapeHtml(p.image_url);

        tbody.innerHTML = products.map(p => `
            <tr class="product-row hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-150" data-id="${p.id}">
                <td class="px-4 py-3">
                    <div class="flex items-center">
                        <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-600 rounded-lg flex items-center justify-center mr-3">
                            ${p.image_url
                                ? `<img src="${safeImg(p)}" alt="${safeName(p)}" class="w-8 h-8 rounded-lg object-cover">`
                                : `<svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>`}
                        </div>
                        <div>
                            <div class="text-sm font-medium text-neutral-900 dark:text-white">${safeName(p)}</div>
                            <div class="text-xs text-neutral-500 dark:text-neutral-400">ID: ${p.id}</div>
                        </div>
                    </div>
                </td>
                <td class="px-4 py-3">
                    <div class="text-sm font-semibold text-neutral-900 dark:text-white">R$ ${parseFloat(p.price).toFixed(2)}</div>
                </td>
                <td class="px-4 py-3">
                    ${stockBadge(p)}
                </td>
                <td class="px-4 py-3 text-right">
                    <div class="flex items-center justify-end space-x-1">
                        <a href="/products/${p.id}/" class="inline-flex items-center px-2 py-1.5 border border-neutral-300 dark:border-neutral-600 text-xs font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                            Ver
                        </a>
                        <a href="/products/edit/${p.id}/" class="inline-flex items-center px-2 py-1.5 border border-neutral-300 dark:border-neutral-600 text-xs font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            Editar
                        </a>
                        <button onclick="deleteProduct(${p.id}, '${safeName(p).replace(/'/g, "\\'")}')" class="inline-flex items-center px-2 py-1.5 border border-red-300 dark:border-red-600 text-xs font-medium rounded text-red-700 dark:text-red-400 bg-white dark:bg-neutral-800 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors duration-200">
                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Excluir
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function renderCards(products) {
        const container = document.getElementById('mobileCardsContainer');
        if (!container) return;

        const safeName = (p) => escapeHtml(p.name);
        const safeImg = (p) => escapeHtml(p.image_url);

        container.innerHTML = products.map(p => `
            <div class="product-card p-3 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-150" data-id="${p.id}">
                <div class="flex items-start space-x-3">
                    <div class="w-10 h-10 bg-neutral-100 dark:bg-neutral-600 rounded-lg flex items-center justify-center flex-shrink-0">
                        ${p.image_url
                            ? `<img src="${safeImg(p)}" alt="${safeName(p)}" class="w-10 h-10 rounded-lg object-cover">`
                            : `<svg class="w-5 h-5 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="text-sm font-medium text-neutral-900 dark:text-white truncate">${safeName(p)}</h4>
                        <div class="flex items-center mt-2 space-x-3">
                            <span class="text-sm font-semibold text-neutral-900 dark:text-white">R$ ${parseFloat(p.price).toFixed(2)}</span>
                            ${stockBadge(p)}
                        </div>
                        <div class="flex items-center mt-3 space-x-2">
                            <a href="/products/${p.id}/" class="inline-flex items-center px-2 py-1 border border-neutral-300 dark:border-neutral-600 text-xs font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800">Ver</a>
                            <a href="/products/edit/${p.id}/" class="inline-flex items-center px-2 py-1 border border-neutral-300 dark:border-neutral-600 text-xs font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800">Editar</a>
                            <button onclick="deleteProduct(${p.id}, '${safeName(p).replace(/'/g, "\\'")}')" class="inline-flex items-center px-2 py-1 border border-red-300 dark:border-red-600 text-xs font-medium rounded text-red-700 dark:text-red-400 bg-white dark:bg-neutral-800">Excluir</button>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats(stats) {
        if (!stats) return;
        const el = (id) => document.getElementById(id);
        if (el('statTotal')) el('statTotal').textContent = stats.total_products;
        if (el('statValue')) el('statValue').textContent = `R$ ${parseFloat(stats.total_value).toFixed(2).replace('.', ',')}`;
        if (el('statStock')) el('statStock').textContent = stats.with_stock_control;
        if (el('statCategories')) el('statCategories').textContent = stats.total_categories;
    }

    function updatePagination(data) {
        const pg = data.page;
        const paginationEl = document.getElementById('paginationControls');
        if (paginationEl) paginationEl.style.display = (pg && pg.total_items > 0) ? '' : 'none';

        if (resultsInfo) {
            if (!pg || pg.total_items === 0) {
                resultsInfo.textContent = 'Nenhum produto encontrado';
            } else {
                const start = (pg.current - 1) * pg.per_page + 1;
                const end = Math.min(pg.current * pg.per_page, pg.total_items);
                resultsInfo.textContent = `Mostrando ${start}-${end} de ${pg.total_items} produtos`;
            }
        }

        if (prevButton) prevButton.disabled = !pg || pg.current <= 1;
        if (nextButton) nextButton.disabled = !pg || pg.current >= pg.total_pages;

        if (pageNumbers) {
            pageNumbers.innerHTML = '';
            if (pg && pg.total_pages > 1) {
                let startPage = Math.max(1, pg.current - 2);
                let endPage = Math.min(pg.total_pages, startPage + 4);
                if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = `px-3 py-1.5 text-sm font-medium rounded transition-colors duration-200 ${
                        i === pg.current
                            ? 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900'
                            : 'border border-neutral-300 dark:border-neutral-600 text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700'
                    }`;
                    btn.addEventListener('click', () => { currentPage = i; loadProducts(); });
                    pageNumbers.appendChild(btn);
                }
            }
        }
    }

    window.deleteProduct = async function(id, name) {
        const confirmed = await confirmModal({
            title: 'Excluir Produto',
            message: `Tem certeza que deseja excluir "${name}"? Esta ação não pode ser desfeita.`,
            confirmText: 'Excluir',
        });

        if (!confirmed) return;

        const { ok, data } = await apiRequest(`/products/api/${id}/delete/`, { method: 'POST' });
        if (ok) {
            const row = document.querySelector(`tr[data-id="${id}"], .product-card[data-id="${id}"]`);
            if (row) {
                row.classList.add('row-removing');
                row.addEventListener('animationend', () => loadProducts());
            } else {
                loadProducts();
            }
            showToast(apiMessage(data), 'success');
        } else {
            showToast(apiMessage(data), 'error');
        }
    };
});
</script>

{% endblock %}

{% extends 'dashboard.html' %}

{% block content %}
<style>
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
    input[type=number] {
        -moz-appearance: textfield;
    }
</style>

<div class="max-w-7xl mx-auto mobile-content-padding h-full flex flex-col">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                </svg>
            </div>
            <div>
                <h2 class="text-xl md:text-2xl font-bold text-neutral-900 dark:text-white">Estoque</h2>
                <p class="text-xs md:text-sm text-neutral-600 dark:text-neutral-400">Gerenciar quantidades</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative flex-1 sm:flex-none">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Buscar produtos..."
                    class="w-full sm:w-64 px-3 py-2 text-sm border border-neutral-300 dark:border-neutral-600 rounded-lg bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white placeholder-neutral-500 dark:placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400 transition-colors duration-200">
                <svg class="absolute right-3 top-2.5 w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <button id="quickStockBtnDesktop" type="button" aria-label="Atualizacao rapida de estoque" class="hidden sm:inline-flex items-center gap-2 px-4 py-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                Atualizacao Rapida
            </button>
        </div>
    </div>

    <!-- Mobile Quick Stock Button -->
    <div class="flex sm:hidden mb-3">
        <button id="quickStockBtnMobile" type="button" aria-label="Atualizacao rapida de estoque" class="w-full inline-flex items-center justify-center gap-2 px-4 py-3 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200 shadow-sm focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            Atualizacao Rapida
        </button>
    </div>

    <!-- Stat Cards (clickable filters) -->
    <div class="grid grid-cols-3 gap-3 mb-4">
        <button onclick="setFilter('all')" id="filterAll" class="bg-white dark:bg-neutral-800 p-3 rounded-lg border-2 border-neutral-900 dark:border-white shadow-sm text-left transition-all duration-200">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-neutral-600 dark:text-neutral-400">Limitados</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statTotal"><span class="skeleton inline-block w-8 h-5 rounded">&nbsp;</span></p>
                </div>
                <div class="w-8 h-8 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                    </svg>
                </div>
            </div>
        </button>

        <button onclick="setFilter('low')" id="filterLow" class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm text-left transition-all duration-200 hover:border-yellow-400 dark:hover:border-yellow-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-yellow-600 dark:text-yellow-400">Estoque Baixo</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statLow"><span class="skeleton inline-block w-8 h-5 rounded">&nbsp;</span></p>
                </div>
                <div class="w-8 h-8 bg-yellow-50 dark:bg-yellow-900/30 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                    </svg>
                </div>
            </div>
        </button>

        <button onclick="setFilter('out')" id="filterOut" class="bg-white dark:bg-neutral-800 p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 shadow-sm text-left transition-all duration-200 hover:border-red-400 dark:hover:border-red-500">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs font-medium text-red-600 dark:text-red-400">Esgotados</p>
                    <p class="text-lg font-bold text-neutral-900 dark:text-white" id="statOut"><span class="skeleton inline-block w-8 h-5 rounded">&nbsp;</span></p>
                </div>
                <div class="w-8 h-8 bg-red-50 dark:bg-red-900/30 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </button>
    </div>

    <!-- Stock Cards Container -->
    <div class="bg-white dark:bg-neutral-800 rounded-xl border border-neutral-200 dark:border-neutral-700 shadow-sm overflow-hidden flex-1 flex flex-col">
        <div class="px-4 md:px-6 py-3 border-b border-neutral-200 dark:border-neutral-700 flex items-center justify-between">
            <h3 class="text-base font-semibold text-neutral-900 dark:text-white">Produtos com Estoque Limitado</h3>
            <div class="flex items-center gap-2 text-sm text-neutral-600 dark:text-neutral-400">
                <span id="resultsInfo"><span class="skeleton inline-block w-40 h-4 rounded">&nbsp;</span></span>
            </div>
        </div>

        <div class="flex-1 overflow-hidden" id="stockContainer">
            <!-- Cards Grid -->
            <div class="h-full overflow-hidden p-4" id="cardsGrid">
            </div>
        </div>

        <!-- Pagination -->
        <div class="px-4 md:px-6 py-3 border-t border-neutral-200 dark:border-neutral-700 flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-3" id="paginationControls">
            <div class="flex items-center justify-center sm:justify-start gap-2">
                <span class="text-xs text-neutral-600 dark:text-neutral-400">Itens por pagina:</span>
                <select id="itemsPerPage" class="text-sm border border-neutral-300 dark:border-neutral-600 rounded px-2 py-1 bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                </select>
            </div>
            <div class="flex items-center justify-center gap-2">
                <button id="prevPage" class="inline-flex items-center px-3 py-1.5 border border-neutral-300 dark:border-neutral-600 text-sm font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Anterior
                </button>
                <div id="pageNumbers" class="flex items-center gap-1"></div>
                <button id="nextPage" class="inline-flex items-center px-3 py-1.5 border border-neutral-300 dark:border-neutral-600 text-sm font-medium rounded text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                    Proxima
                    <svg class="w-3 h-3 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Quick Stock Modal (Fullscreen) -->
<div id="quickStockModal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true" aria-labelledby="quickStockModalTitle">
    <div id="quickStockOverlay" class="absolute inset-0 bg-black bg-opacity-50"></div>
    <div id="quickStockContent" class="absolute inset-0 bg-white dark:bg-neutral-900 flex flex-col h-full">
        <!-- Header -->
        <div class="flex-shrink-0 border-b border-neutral-200 dark:border-neutral-700 px-4 md:px-6 py-3">
            <div class="max-w-3xl mx-auto">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-9 h-9 bg-neutral-100 dark:bg-neutral-800 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-neutral-700 dark:text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <div class="min-w-0">
                            <h2 id="quickStockModalTitle" class="text-base md:text-lg font-bold text-neutral-900 dark:text-white truncate">Atualizacao Rapida</h2>
                            <p class="text-xs text-neutral-500 dark:text-neutral-400 truncate">Defina o estoque dos produtos abaixo do minimo</p>
                        </div>
                    </div>
                    <button id="quickStockCloseBtn" type="button" aria-label="Fechar" class="w-9 h-9 flex items-center justify-center rounded-lg text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors duration-200 flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex-1 h-2 bg-neutral-200 dark:bg-neutral-700 rounded-full overflow-hidden">
                        <div id="quickStockProgressBar" class="h-full bg-green-500 transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <span id="quickStockProgressText" class="text-xs font-medium text-neutral-600 dark:text-neutral-400 whitespace-nowrap">0 de 0 produtos atualizados</span>
                </div>
            </div>
        </div>

        <!-- Body -->
        <div id="quickStockBody" class="flex-1 overflow-y-auto px-4 md:px-6 py-4">
            <div class="max-w-3xl mx-auto" id="quickStockList">
            </div>
        </div>
    </div>
</div>

<!-- Save Bar -->
<div id="saveBar" class="fixed bottom-0 left-0 md:left-64 right-0 bg-white dark:bg-neutral-800 border-t border-neutral-200 dark:border-neutral-700 px-4 py-3 z-30 shadow-lg hidden">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <span class="text-sm text-neutral-600 dark:text-neutral-400">
            <span id="dirtyCount" class="font-semibold text-neutral-900 dark:text-white">0</span> alteracao(es) pendente(s)
        </span>
        <div class="flex gap-2">
            <button id="discardBtn" class="px-3 py-2 border border-neutral-300 dark:border-neutral-600 text-sm font-medium rounded-lg text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700 transition-colors duration-200">
                Descartar
            </button>
            <button id="saveBtn" class="px-4 py-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200 shadow-sm">
                Salvar
            </button>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentPage = 1;
    let itemsPerPage = 5;
    let currentFilter = 'all';
    let searchTimeout = null;
    const dirtyItems = new Map();
    const originalData = new Map();
    const productModes = new Map();
    const productMinimums = new Map();

    const searchInput = document.getElementById('searchInput');
    const resultsInfo = document.getElementById('resultsInfo');
    const itemsPerPageSelect = document.getElementById('itemsPerPage');
    const prevButton = document.getElementById('prevPage');
    const nextButton = document.getElementById('nextPage');
    const pageNumbers = document.getElementById('pageNumbers');
    const saveBar = document.getElementById('saveBar');
    const saveBtn = document.getElementById('saveBtn');
    const discardBtn = document.getElementById('discardBtn');

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function stockBadge(qty, minimum) {
        if (qty === 0) {
            return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200">Esgotado</span>`;
        }
        if (qty <= minimum) {
            return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 dark:bg-yellow-900 text-yellow-800 dark:text-yellow-200">${qty} unidades</span>`;
        }
        return `<span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200">${qty} unidades</span>`;
    }

    function showLoading() {
        const grid = document.getElementById('cardsGrid');
        if (grid) grid.innerHTML = loadingPlaceholder();
    }

    function hideLoading() {}

    showLoading();
    loadStock();

    if (searchInput) {
        searchInput.addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { currentPage = 1; loadStock(); }, 300);
        });
    }

    if (itemsPerPageSelect) {
        itemsPerPageSelect.addEventListener('change', function() {
            itemsPerPage = parseInt(this.value);
            currentPage = 1;
            loadStock();
        });
    }

    if (prevButton) {
        prevButton.addEventListener('click', function() {
            if (currentPage > 1) { currentPage--; loadStock(); }
        });
    }

    if (nextButton) {
        nextButton.addEventListener('click', function() { currentPage++; loadStock(); });
    }

    window.setFilter = function(filter) {
        if (currentFilter === filter && filter !== 'all') {
            currentFilter = 'all';
        } else {
            currentFilter = filter;
        }
        currentPage = 1;
        updateFilterUI();
        loadStock();
    };

    function updateFilterUI() {
        const filters = { all: 'filterAll', low: 'filterLow', out: 'filterOut' };
        for (const [key, id] of Object.entries(filters)) {
            const el = document.getElementById(id);
            if (!el) continue;
            if (key === currentFilter) {
                el.className = el.className
                    .replace(/border border-neutral-200 dark:border-neutral-700/g, '')
                    .replace(/border-2 border-neutral-900 dark:border-white/g, '')
                    + ' border-2 border-neutral-900 dark:border-white';
            } else {
                el.className = el.className
                    .replace(/border-2 border-neutral-900 dark:border-white/g, '')
                    .replace(/border border-neutral-200 dark:border-neutral-700/g, '')
                    + ' border border-neutral-200 dark:border-neutral-700';
            }
        }
    }

    async function loadStock() {
        const search = searchInput ? searchInput.value.trim() : '';
        showLoading();
        const { ok, data } = await apiRequest(
            `/products/api/stock/?page=${currentPage}&per_page=${itemsPerPage}&search=${encodeURIComponent(search)}&filter=${currentFilter}`
        );
        if (!ok) { document.getElementById('cardsGrid').innerHTML = ''; return; }

        data.data.forEach(p => {
            if (!originalData.has(p.id)) {
                originalData.set(p.id, p.stock_quantity);
            }
            productMinimums.set(p.id, p.stock_minimum);
        });

        renderCards(data.data);
        updatePagination(data);
        updateStats(data.stats);

        const grid = document.getElementById('cardsGrid');
        if (grid) applyFadeIn(grid);
    }

    function renderCards(products) {
        const grid = document.getElementById('cardsGrid');
        if (!grid) return;

        if (products.length === 0) {
            grid.innerHTML = `
                <div class="text-center py-12 flex flex-col items-center justify-center h-full">
                    <div class="w-16 h-16 bg-neutral-100 dark:bg-neutral-700 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-neutral-400 dark:text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-medium text-neutral-900 dark:text-white mb-2">Nenhum produto encontrado</h3>
                    <p class="text-neutral-600 dark:text-neutral-400">Nenhum produto com estoque limitado neste filtro</p>
                </div>`;
            return;
        }

        grid.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">${products.map(p => renderCard(p)).join('')}</div>`;
    }

    function getCardState(productId, originalQty) {
        const mode = productModes.get(productId) || 'add';
        const inputValue = dirtyItems.has(productId) ? dirtyItems.get(productId) : (mode === 'add' ? 0 : originalQty);
        const isDirty = mode === 'add' ? inputValue > 0 : inputValue !== originalQty;
        return { mode, inputValue, isDirty };
    }

    function buildPreview(mode, inputValue, originalQty) {
        if (mode === 'add' && inputValue > 0) {
            const result = originalQty + inputValue;
            return `<p class="text-xs font-medium text-green-600 dark:text-green-400 mt-2">${originalQty} + ${inputValue} = ${result}</p>`;
        } else if (mode === 'set' && inputValue !== originalQty) {
            const color = inputValue === 0 ? 'text-red-600 dark:text-red-400' : 'text-blue-600 dark:text-blue-400';
            return `<p class="text-xs font-medium ${color} mt-2">${originalQty} &rarr; ${inputValue}</p>`;
        }
        return '';
    }

    function renderCard(p) {
        const originalQty = originalData.get(p.id) ?? p.stock_quantity;
        const minimum = productMinimums.get(p.id) ?? p.stock_minimum;
        const { mode, inputValue, isDirty } = getCardState(p.id, originalQty);
        const safeName = escapeHtml(p.name);
        const safeImg = escapeHtml(p.image_url);
        const preview = buildPreview(mode, inputValue, originalQty);

        return `
        <div class="p-3 rounded-lg border ${isDirty ? 'border-l-4 border-yellow-400 dark:border-yellow-500 bg-yellow-50/30 dark:bg-yellow-900/10' : 'border-neutral-200 dark:border-neutral-700'} transition-all duration-200" data-product-id="${p.id}">
            <!-- Product Info -->
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-10 h-10 bg-neutral-100 dark:bg-neutral-600 rounded-lg flex items-center justify-center flex-shrink-0">
                    ${p.image_url
                        ? `<img src="${safeImg}" alt="${safeName}" class="w-10 h-10 rounded-lg object-cover">`
                        : `<svg class="w-5 h-5 text-neutral-600 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>`}
                </div>
                <div class="flex-1 min-w-0">
                    <h4 class="text-sm font-medium text-neutral-900 dark:text-white truncate" title="${safeName}">${safeName}</h4>
                    <div class="flex items-center gap-2 mt-0.5">
                        <span class="text-xs text-neutral-500 dark:text-neutral-400">R$ ${parseFloat(p.price).toFixed(2)}</span>
                        ${stockBadge(originalQty, minimum)}
                    </div>
                </div>
            </div>

            <!-- Mode Toggle -->
            <div class="flex rounded-lg overflow-hidden border border-neutral-200 dark:border-neutral-600 mb-3" data-mode-toggle="${p.id}">
                <button onclick="switchMode(${p.id}, 'set')" data-mode-btn="set" class="flex-1 py-1.5 text-xs font-medium transition-colors duration-200 ${mode === 'set' ? 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900' : 'bg-neutral-50 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-600'}">
                    Definir
                </button>
                <button onclick="switchMode(${p.id}, 'add')" data-mode-btn="add" class="flex-1 py-1.5 text-xs font-medium transition-colors duration-200 ${mode === 'add' ? 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900' : 'bg-neutral-50 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-600'}">
                    Adicionar
                </button>
            </div>

            <!-- Stepper -->
            <div class="flex items-center justify-center gap-2">
                <button onclick="stepValue(${p.id}, -1)" class="w-11 h-11 flex items-center justify-center rounded-lg bg-neutral-100 dark:bg-neutral-700 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors duration-200 active:scale-95 text-lg font-bold">
                    &minus;
                </button>
                <input
                    type="number"
                    id="input-${p.id}"
                    value="${inputValue}"
                    min="0"
                    inputmode="numeric"
                    onchange="onInputChange(${p.id}, this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur()}"
                    class="w-16 h-11 text-center text-sm font-semibold rounded-lg border border-neutral-300 dark:border-neutral-600 bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                <button onclick="stepValue(${p.id}, 1)" class="w-11 h-11 flex items-center justify-center rounded-lg bg-neutral-100 dark:bg-neutral-700 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors duration-200 active:scale-95 text-lg font-bold">
                    +
                </button>
            </div>

            <!-- Preview -->
            ${preview}
        </div>`;
    }

    window.switchMode = function(productId, newMode) {
        const original = originalData.get(productId);
        productModes.set(productId, newMode);
        const defaultValue = newMode === 'add' ? 0 : original;
        dirtyItems.set(productId, defaultValue);
        refreshCard(productId);
        updateSaveBar();
    };

    window.stepValue = function(productId, delta) {
        const original = originalData.get(productId);
        const mode = productModes.get(productId) || 'add';
        const current = dirtyItems.has(productId) ? dirtyItems.get(productId) : (mode === 'add' ? 0 : original);
        const newVal = Math.max(0, current + delta);
        dirtyItems.set(productId, newVal);
        refreshCard(productId);
        updateSaveBar();
    };

    window.onInputChange = function(productId, rawValue) {
        let val = parseInt(rawValue) || 0;
        if (val < 0) val = 0;
        dirtyItems.set(productId, val);
        refreshCard(productId);
        updateSaveBar();
    };

    function refreshCard(productId) {
        const cardEl = document.querySelector(`[data-product-id="${productId}"]`);
        if (!cardEl) return;
        const original = originalData.get(productId);
        const { mode, inputValue, isDirty } = getCardState(productId, original);

        if (isDirty) {
            cardEl.className = 'p-3 rounded-lg border border-l-4 border-yellow-400 dark:border-yellow-500 bg-yellow-50/30 dark:bg-yellow-900/10 transition-all duration-200';
        } else {
            cardEl.className = 'p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 transition-all duration-200';
        }

        const activeClass = 'flex-1 py-1.5 text-xs font-medium transition-colors duration-200 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900';
        const inactiveClass = 'flex-1 py-1.5 text-xs font-medium transition-colors duration-200 bg-neutral-50 dark:bg-neutral-700 text-neutral-600 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-600';
        const setBtn = cardEl.querySelector('[data-mode-btn="set"]');
        const addBtn = cardEl.querySelector('[data-mode-btn="add"]');
        if (setBtn) setBtn.className = mode === 'set' ? activeClass : inactiveClass;
        if (addBtn) addBtn.className = mode === 'add' ? activeClass : inactiveClass;

        const input = document.getElementById(`input-${productId}`);
        if (input && document.activeElement !== input) {
            input.value = inputValue;
        }

        let previewEl = cardEl.querySelector('.preview-text');
        if (!previewEl) {
            previewEl = document.createElement('div');
            previewEl.className = 'preview-text';
            cardEl.appendChild(previewEl);
        }
        previewEl.innerHTML = buildPreview(mode, inputValue, original);
    }

    function getDirtyCount() {
        let count = 0;
        dirtyItems.forEach((value, id) => {
            const original = originalData.get(id);
            const mode = productModes.get(id) || 'add';
            const isDirty = mode === 'add' ? value > 0 : value !== original;
            if (isDirty) count++;
        });
        return count;
    }

    function updateSaveBar() {
        const count = getDirtyCount();
        const dirtyCountEl = document.getElementById('dirtyCount');
        if (dirtyCountEl) dirtyCountEl.textContent = count;
        if (saveBar) {
            saveBar.classList.toggle('hidden', count === 0);
            const bottomNav = document.getElementById('bottomNav');
            if (bottomNav && window.innerWidth < 768) {
                saveBar.style.bottom = bottomNav.offsetHeight + 'px';
            } else {
                saveBar.style.bottom = '0';
            }
        }
    }

    if (saveBtn) {
        saveBtn.addEventListener('click', async function() {
            if (dirtyItems.size === 0) return;

            setButtonLoading(saveBtn, true, 'Salvando...');

            const updates = [];
            dirtyItems.forEach((value, id) => {
                const original = originalData.get(id);
                const mode = productModes.get(id) || 'add';
                const isDirty = mode === 'add' ? value > 0 : value !== original;
                if (isDirty) {
                    updates.push({ id, mode, value });
                }
            });

            const { ok, data } = await apiRequest('/products/api/stock/bulk-update/', {
                method: 'POST',
                body: { updates },
            });

            setButtonLoading(saveBtn, false);

            if (ok) {
                showToast(apiMessage(data), 'success');
                dirtyItems.clear();
                productModes.clear();
                originalData.clear();
                productMinimums.clear();
                updateSaveBar();
                loadStock();
            } else {
                showToast(apiMessage(data), 'error');
            }
        });
    }

    if (discardBtn) {
        discardBtn.addEventListener('click', async function() {
            const confirmed = await confirmModal({
                title: 'Descartar alteracoes',
                message: `Tem certeza que deseja descartar ${dirtyItems.size} alteracao(es) pendente(s)?`,
                confirmText: 'Descartar',
            });
            if (!confirmed) return;

            dirtyItems.clear();
            productModes.clear();
            productMinimums.clear();
            updateSaveBar();
            loadStock();
        });
    }

    function updateStats(stats) {
        if (!stats) return;
        const el = (id) => document.getElementById(id);
        if (el('statTotal')) animateNumber(el('statTotal'), stats.total_limited);
        if (el('statLow')) animateNumber(el('statLow'), stats.low_stock);
        if (el('statOut')) animateNumber(el('statOut'), stats.out_of_stock);
    }

    // ==================== QUICK STOCK MODAL ====================
    const quickStockState = {
        products: [],
        updatedIds: new Set(),
        inflight: new Map(),
        pendingValues: new Map(),
        previouslyFocused: null,
    };

    const quickStockModal = document.getElementById('quickStockModal');
    const quickStockOverlay = document.getElementById('quickStockOverlay');
    const quickStockContent = document.getElementById('quickStockContent');
    const quickStockList = document.getElementById('quickStockList');
    const quickStockCloseBtn = document.getElementById('quickStockCloseBtn');
    const quickStockBtnDesktop = document.getElementById('quickStockBtnDesktop');
    const quickStockBtnMobile = document.getElementById('quickStockBtnMobile');
    const quickStockProgressBar = document.getElementById('quickStockProgressBar');
    const quickStockProgressText = document.getElementById('quickStockProgressText');

    async function openQuickStockModal() {
        if (!quickStockModal) return;
        quickStockState.previouslyFocused = document.activeElement;
        quickStockState.products = [];
        quickStockState.updatedIds = new Set();
        quickStockState.inflight.clear();
        quickStockState.pendingValues.clear();

        quickStockModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
        if (quickStockOverlay) {
            quickStockOverlay.classList.remove('modal-overlay-enter');
            void quickStockOverlay.offsetWidth;
            quickStockOverlay.classList.add('modal-overlay-enter');
        }
        if (quickStockContent) {
            quickStockContent.classList.remove('modal-content-enter');
            void quickStockContent.offsetWidth;
            quickStockContent.classList.add('modal-content-enter');
        }

        document.getElementById('quickStockCloseBtn')?.focus();

        if (quickStockList) {
            quickStockList.innerHTML = loadingPlaceholder();
        }
        updateQuickProgress();
        await loadLowStockProducts();
    }

    function closeQuickStockModal() {
        if (!quickStockModal) return;
        quickStockModal.classList.add('hidden');
        document.body.style.overflow = '';
        quickStockState.previouslyFocused?.focus?.();
        quickStockState.previouslyFocused = null;
        if (quickStockState.updatedIds.size > 0) {
            originalData.clear();
            productMinimums.clear();
            loadStock();
        }
    }

    async function loadLowStockProducts() {
        const { ok, data } = await apiRequest('/products/api/stock/low/');
        if (!ok) {
            if (quickStockList) {
                quickStockList.innerHTML = `<div class="text-center py-12 text-sm text-neutral-500 dark:text-neutral-400">Erro ao carregar produtos.</div>`;
            }
            showToast(apiMessage(data), 'error');
            return;
        }
        const products = Array.isArray(data?.data) ? data.data : [];
        quickStockState.products = products;
        renderQuickList(products);
        updateQuickProgress();
        if (quickStockList) applyFadeIn(quickStockList);
    }

    function renderQuickList(products) {
        if (!quickStockList) return;
        if (products.length === 0) {
            quickStockList.innerHTML = renderQuickEmptyState();
            return;
        }
        quickStockList.innerHTML = `<div class="grid grid-cols-1 gap-3">${products.map(p => renderQuickCard(p)).join('')}</div>`;
    }

    function renderQuickEmptyState() {
        return `
        <div class="flex flex-col items-center justify-center text-center py-16 px-4">
            <div class="w-20 h-20 bg-green-100 dark:bg-green-900/40 rounded-full flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-lg font-semibold text-neutral-900 dark:text-white mb-2">Tudo em ordem!</h3>
            <p class="text-sm text-neutral-600 dark:text-neutral-400 mb-6 max-w-sm">Nenhum produto esta abaixo do estoque minimo no momento.</p>
            <button type="button" onclick="closeQuickStockModalFromUI()" class="inline-flex items-center px-4 py-2 bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium rounded-lg hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-all duration-200">
                Fechar
            </button>
        </div>`;
    }

    function renderQuickCard(p) {
        const safeName = escapeHtml(p.name);
        const safeImg = escapeHtml(p.image_url);
        const priceStr = parseFloat(p.price).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const qty = p.stock_quantity;
        const minimum = p.stock_minimum;
        return `
        <div class="qs-card p-3 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-800 transition-all duration-200" data-product-id="${p.id}" data-pending-value="${qty}" data-saved-value="${qty}">
            <div class="flex items-start gap-3">
                <div class="w-12 h-12 bg-neutral-100 dark:bg-neutral-700 rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden">
                    ${p.image_url
                        ? `<img src="${safeImg}" alt="${safeName}" class="w-12 h-12 rounded-lg object-cover">`
                        : `<svg class="w-6 h-6 text-neutral-500 dark:text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>`}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-start justify-between gap-2">
                        <div class="min-w-0 flex-1">
                            <h4 class="text-sm font-semibold text-neutral-900 dark:text-white truncate" title="${safeName}">${safeName}</h4>
                            <p class="text-xs text-neutral-500 dark:text-neutral-400 mt-0.5">R$ ${priceStr}</p>
                            <span class="inline-flex items-center px-2 py-0.5 mt-1 rounded-full text-xs font-medium ${qty === 0 ? 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200' : 'bg-yellow-100 dark:bg-yellow-900 text-yellow-800 dark:text-yellow-200'}">
                                Estoque: ${qty} / minimo ${minimum}
                            </span>
                        </div>
                        <div class="qs-status flex items-center justify-center w-7 h-7 flex-shrink-0" data-status="idle"></div>
                    </div>
                    <div class="flex items-center justify-end gap-2 mt-3">
                        <button type="button" aria-label="Diminuir" onclick="quickStep(${p.id}, -1)" class="w-12 h-12 flex items-center justify-center rounded-lg bg-neutral-100 dark:bg-neutral-700 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors duration-200 active:scale-95 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                            &minus;
                        </button>
                        <input
                            type="number"
                            id="qs-input-${p.id}"
                            value="${qty}"
                            min="0"
                            inputmode="numeric"
                            aria-label="Quantidade em estoque"
                            oninput="quickInputChange(${p.id}, this.value)"
                            onkeydown="if(event.key==='Enter'){this.blur()}"
                            class="w-20 h-12 text-center text-base font-semibold rounded-lg border border-neutral-300 dark:border-neutral-600 bg-white dark:bg-neutral-700 text-neutral-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                        <button type="button" aria-label="Aumentar" onclick="quickStep(${p.id}, 1)" class="w-12 h-12 flex items-center justify-center rounded-lg bg-neutral-100 dark:bg-neutral-700 text-neutral-700 dark:text-neutral-300 hover:bg-neutral-200 dark:hover:bg-neutral-600 transition-colors duration-200 active:scale-95 text-lg font-bold focus:outline-none focus:ring-2 focus:ring-neutral-500 dark:focus:ring-neutral-400">
                            +
                        </button>
                    </div>
                    <button type="button" onclick="quickSaveClick(${p.id})" disabled aria-label="Salvar estoque" class="qs-save-btn mt-3 w-full h-11 inline-flex items-center justify-center gap-2 rounded-lg bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-sm font-medium hover:bg-neutral-800 dark:hover:bg-neutral-100 transition-colors duration-200 disabled:opacity-40 disabled:cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-neutral-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        Salvar
                    </button>
                </div>
            </div>
        </div>`;
    }

    function getQuickCardEl(productId) {
        return quickStockList ? quickStockList.querySelector(`[data-product-id="${productId}"]`) : null;
    }

    function setQuickCardStatus(productId, status) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        const slot = card.querySelector('.qs-status');
        if (!slot) return;
        slot.dataset.status = status;
        if (status === 'idle') {
            slot.innerHTML = '';
        } else if (status === 'saving') {
            slot.innerHTML = `
                <svg class="animate-spin w-5 h-5 text-neutral-400 dark:text-neutral-500" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>`;
        } else if (status === 'success') {
            slot.innerHTML = `
                <svg class="w-6 h-6 text-green-500 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>`;
        } else if (status === 'error') {
            const pending = card.dataset.pendingValue;
            slot.innerHTML = `
                <button type="button" aria-label="Tentar novamente" title="Tentar novamente" onclick="quickRetry(${productId})" class="flex items-center justify-center w-7 h-7 rounded-full bg-red-100 dark:bg-red-900/40 text-red-600 dark:text-red-400 hover:bg-red-200 dark:hover:bg-red-900/60 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-red-500">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                </button>`;
        }
    }

    window.quickStep = function(productId, delta) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        const input = document.getElementById(`qs-input-${productId}`);
        if (!input) return;
        const current = parseInt(input.value) || 0;
        const next = Math.max(0, current + delta);
        input.value = next;
        card.dataset.pendingValue = String(next);
        updateQuickSaveButton(productId);
    };

    window.quickInputChange = function(productId, rawValue) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        let val = parseInt(rawValue);
        if (isNaN(val) || val < 0) val = 0;
        card.dataset.pendingValue = String(val);
        updateQuickSaveButton(productId);
    };

    window.quickSaveClick = function(productId) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        const input = document.getElementById(`qs-input-${productId}`);
        if (!input) return;
        let value = parseInt(input.value);
        if (isNaN(value) || value < 0) value = 0;
        saveQuickCard(productId, value);
    };

    window.quickRetry = function(productId) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        const value = parseInt(card.dataset.pendingValue) || 0;
        saveQuickCard(productId, value);
    };

    window.closeQuickStockModalFromUI = function() {
        closeQuickStockModal();
    };

    function updateQuickSaveButton(productId) {
        const card = getQuickCardEl(productId);
        if (!card) return;
        const input = document.getElementById(`qs-input-${productId}`);
        const btn = card.querySelector('.qs-save-btn');
        if (!input || !btn) return;
        if (quickStockState.inflight.get(productId)) {
            btn.disabled = true;
            return;
        }
        const current = parseInt(input.value);
        const saved = parseInt(card.dataset.savedValue);
        const changed = !isNaN(current) && current >= 0 && current !== saved;
        btn.disabled = !changed;
    }

    async function saveQuickCard(productId, value) {
        if (quickStockState.inflight.get(productId)) {
            quickStockState.pendingValues.set(productId, value);
            return;
        }
        quickStockState.inflight.set(productId, true);
        setQuickCardStatus(productId, 'saving');
        updateQuickSaveButton(productId);

        try {
            const { ok, data } = await apiRequest('/products/api/stock/bulk-update/', {
                method: 'POST',
                body: { updates: [{ id: productId, mode: 'set', value }] },
            });

            if (ok && data?.data?.updated === 1) {
                quickStockState.updatedIds.add(productId);
                setQuickCardStatus(productId, 'success');
                const okCard = getQuickCardEl(productId);
                if (okCard) okCard.dataset.savedValue = String(value);
                updateQuickProgress();
            } else {
                setQuickCardStatus(productId, 'error');
                const errList = data?.data?.errors;
                const specific = Array.isArray(errList) && errList.length > 0 ? errList[0] : null;
                showToast(specific || apiMessage(data) || 'Erro ao atualizar estoque', 'error');
            }
        } catch (e) {
            setQuickCardStatus(productId, 'error');
            showToast('Erro de conexao ao salvar', 'error');
        } finally {
            quickStockState.inflight.set(productId, false);
            quickStockState.pendingValues.delete(productId);
            updateQuickSaveButton(productId);
        }
    }

    function updateQuickProgress() {
        const total = quickStockState.products.length;
        const done = quickStockState.updatedIds.size;
        if (quickStockProgressText) {
            quickStockProgressText.textContent = `${done} de ${total} produto${total === 1 ? '' : 's'} atualizado${done === 1 ? '' : 's'}`;
        }
        if (quickStockProgressBar) {
            const pct = total === 0 ? 0 : Math.round((done / total) * 100);
            quickStockProgressBar.style.width = `${pct}%`;
        }
    }

    if (quickStockBtnDesktop) {
        quickStockBtnDesktop.addEventListener('click', openQuickStockModal);
    }
    if (quickStockBtnMobile) {
        quickStockBtnMobile.addEventListener('click', openQuickStockModal);
    }
    if (quickStockCloseBtn) {
        quickStockCloseBtn.addEventListener('click', closeQuickStockModal);
    }
    if (quickStockOverlay) {
        quickStockOverlay.addEventListener('click', closeQuickStockModal);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key !== 'Escape') return;
        if (!quickStockModal || quickStockModal.classList.contains('hidden')) return;
        const confirmEl = document.getElementById('confirm-modal');
        if (confirmEl && !confirmEl.classList.contains('hidden')) return;
        closeQuickStockModal();
    });
    // ==================== END QUICK STOCK MODAL ====================

    function updatePagination(data) {
        const pg = data.page;
        const paginationEl = document.getElementById('paginationControls');
        if (paginationEl) paginationEl.style.display = (pg && pg.total_items > 0) ? '' : 'none';

        if (resultsInfo) {
            if (!pg || pg.total_items === 0) {
                resultsInfo.textContent = 'Nenhum produto encontrado';
            } else {
                const start = (pg.current - 1) * pg.per_page + 1;
                const end = Math.min(pg.current * pg.per_page, pg.total_items);
                resultsInfo.textContent = `${start}-${end} de ${pg.total_items}`;
            }
        }

        if (prevButton) prevButton.disabled = !pg || pg.current <= 1;
        if (nextButton) nextButton.disabled = !pg || pg.current >= pg.total_pages;

        if (pageNumbers) {
            pageNumbers.innerHTML = '';
            if (pg && pg.total_pages > 1) {
                let startPage = Math.max(1, pg.current - 2);
                let endPage = Math.min(pg.total_pages, startPage + 4);
                if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = `px-3 py-1.5 text-sm font-medium rounded transition-colors duration-200 ${
                        i === pg.current
                            ? 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900'
                            : 'border border-neutral-300 dark:border-neutral-600 text-neutral-700 dark:text-neutral-300 bg-white dark:bg-neutral-800 hover:bg-neutral-50 dark:hover:bg-neutral-700'
                    }`;
                    btn.addEventListener('click', () => { currentPage = i; loadStock(); });
                    pageNumbers.appendChild(btn);
                }
            }
        }
    }
});
</script>

{% endblock %}
